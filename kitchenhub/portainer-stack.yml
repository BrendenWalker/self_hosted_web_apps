# Deploy in Portainer as a Compose stack on Docker Standalone (not a Swarm stack).
# Under `networks:` declare BOTH the stack bridge and the shared external net (`edge` or `web`).
# Portainer may 500 if the bridge network is only implicit. Create external net once if needed.
version: '3.8'

services:
  backend:
    image: ${DOCKER_HUB_REGISTRY_USERNAME}/${DOCKER_HUB_BACKEND_IMAGE_NAME:-kitchenhub-backend}:${IMAGE_TAG:-latest}
    container_name: kitchenhub-backend
    ports:
      - "${BACKEND_PORT:-8080}:80"
    environment:
      - PORT=80
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-kitchenhub}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      kitchenhub-network:
        aliases:
          - kitchenhub-backend
      edge:
        aliases:
          - kitchenhub-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${DOCKER_HUB_REGISTRY_USERNAME}/${DOCKER_HUB_FRONTEND_IMAGE_NAME:-kitchenhub-frontend}:${IMAGE_TAG:-latest}
    container_name: kitchenhub-frontend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      - backend
    networks:
      kitchenhub-network:
        aliases:
          - kitchenhub-frontend
      edge:
        aliases:
          - kitchenhub-frontend
    restart: unless-stopped

networks:
  kitchenhub-network:
    driver: bridge
  edge:
    external: true
