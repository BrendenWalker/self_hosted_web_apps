# Mailhub Dovecot - LMTP, IMAP, ManageSieve
# Config and data in /home/mailhub-dovecot (bind from host).
# Provide: passwd-file (e.g. users), maildir under maildir/ or per-user dirs.

protocols = imap lmtp sieve
listen = *

# Mail location: home from userdb (passwd-file); each user's home = .../maildir/<user>
mail_location = maildir:~
# Avoid mmap on index files when maildir is on a bind mount (e.g. Windows host) where mmap can fail
mmap_disable = yes

# Auth: passwd-file in data dir (format: user:password:uid:gid:gecos:home:shell)
# Example: user1:{PLAIN}password:5000:5000::/home/mailhub-dovecot/maildir/user1::
# LMTP recipient user@domain is looked up as local part (%Ln) so one entry "user1" works for user1@localhost.
# Password: use {PLAIN}yourpassword for plaintext (e.g. {PLAIN}secret). Or {BLF-CRYPT}$2y$... etc.
# Password must not contain colons. File must use Unix line endings (LF only).
auth_username_format = %Ln
auth_verbose = yes
passdb {
  driver = passwd-file
  args = /home/mailhub-dovecot/users
}
userdb {
  driver = passwd-file
  args = /home/mailhub-dovecot/users
}

# SSL: optional; if cert/key exist in data dir, enable
# ssl = required
# ssl_cert = </home/mailhub-dovecot/ssl/cert.pem
# ssl_key = </home/mailhub-dovecot/ssl/key.pem
# Allow plain LOGIN on port 143 for localhost (no STARTTLS). Use IMAPS (993) or real certs for remote.
disable_plaintext_auth = no

# Logging
log_path = /dev/stderr
info_log_path = /dev/stderr
debug_log_path = /dev/stderr

# LMTP for local delivery (from Postfix); Alpine dovecot-lmtpd installs to /usr/libexec/dovecot/
service lmtp {
  executable = /usr/libexec/dovecot/lmtp
  inet_listener lmtp {
    address = *
    port = 24
  }
}

# IMAP: 993 IMAPS (TLS); 143 plain IMAP for localhost (e.g. local testing)
service imap-login {
  inet_listener imaps {
    port = 993
  }
  inet_listener imap {
    port = 143
    address = *
  }
}

# ManageSieve
service managesieve-login {
  inet_listener sieve {
    port = 4190
  }
}

# Sieve at LMTP delivery; scripts under user's home (e.g. ~/sieve, active ~/.dovecot.sieve)
protocol lmtp {
  mail_plugins = $mail_plugins sieve
}
plugin {
  sieve = file:~/sieve;active=~/.dovecot.sieve
  sieve_default = /home/mailhub-dovecot/sieve/default.sieve
}
# Allow ManageSieve to manage scripts
protocol sieve {
  managesieve_max_line_length = 65536
}

# Namespace for maildir
namespace inbox {
  inbox = yes
  separator = /
  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Junk {
    auto = subscribe
    special_use = \Junk
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
}
