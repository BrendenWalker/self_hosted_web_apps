[supervisord]
nodaemon=true
user=root

[program:clamd]
command=/usr/sbin/clamd --foreground
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:amavisd]
command=/usr/sbin/amavisd -c /etc/amavis/amavisd.conf foreground
autostart=true
autorestart=true
priority=20
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=POSTFIX_HOST="mailhub-postfix"

[program:freshclam]
command=/usr/bin/freshclam -d -c 4
autostart=true
autorestart=true
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
