# Set re-inject host from environment (POSTFIX_HOST=mailhub-postfix from stack)
# Untaint POSTFIX_HOST so amavisd (running with Perl -T) can open socket to it.
if ($ENV{'POSTFIX_HOST'} && $ENV{'POSTFIX_HOST'} =~ m/^([a-zA-Z0-9_.-]+)$/) {
  my $host = $1;
  $forward_method = "smtp:[$host]:10025";
  $notify_method = $forward_method;
}

# Optional: spam subject tag and tag/tag2 levels (from reference-config: subject rewrite, score thresholds)
if (defined $ENV{'AMAVISD_SPAM_SUBJECT_TAG'} && $ENV{'AMAVISD_SPAM_SUBJECT_TAG'} =~ m/^([^\n\r]*)$/) {
  $sa_spam_subject_tag = $1;
}
if (defined $ENV{'AMAVISD_SPAM_TAG_LEVEL'} && $ENV{'AMAVISD_SPAM_TAG_LEVEL'} =~ m/^([0-9.-]+)$/) {
  $sa_tag_level_deflt = $1 + 0;
}
if (defined $ENV{'AMAVISD_SPAM_TAG2_LEVEL'} && $ENV{'AMAVISD_SPAM_TAG2_LEVEL'} =~ m/^([0-9.-]+)$/) {
  $sa_tag2_level_deflt = $1 + 0;
}

# Optional: spam/virus quarantine recipients from environment
# Use an explicit policy bank for port 10024 so these settings are definitely applied.
# D_DISCARD = 0 in Amavis::Conf; use numeric so policy bank comparison works.
$interface_policy{'10024'} = 'MAILHUB';
my $kill = 5.0;
if ($ENV{'AMAVISD_SPAM_KILL_LEVEL'} && $ENV{'AMAVISD_SPAM_KILL_LEVEL'} =~ m/^([0-9]+(?:\.[0-9]+)?)$/) {
  $kill = $1 + 0;
}
# Global so refs in default bank see it; spam_kill_level_maps is the per-recipient lookup.
# Do not add sa_kill_level_deflt to the policy bank (unknown field in this amavisd version).
$sa_kill_level_deflt = $kill;
$policy_bank{'MAILHUB'} = {
  'final_spam_destiny' => 0,   # 0 = D_DISCARD (block delivery when score >= kill level)
  'final_virus_destiny' => 0,   # 0 = D_DISCARD (block virus delivery)
  'spam_kill_level_maps' => [ $kill ],
  # Only Postfix connects to 10024; it already accepted the mail for local delivery. Mark as
  # originating so amavisd does not apply DiscardedOpenRelay (which discards instead of quarantining).
  'originating' => 1,
};

# Quarantine to address: use smtp to Postfix when POSTFIX_HOST is set, else local: (uses $notify_method)
my $quarantine_smtp = ($ENV{'POSTFIX_HOST'} && $ENV{'POSTFIX_HOST'} =~ m/^([a-zA-Z0-9_.-]+)$/) ? "smtp:[$1]:10025" : 'local:';

if ($ENV{'AMAVISD_SPAM_QUARANTINE_TO'} && $ENV{'AMAVISD_SPAM_QUARANTINE_TO'} =~ m/^([^\s,]+)$/) {
  my $addr = $1;
  $spam_quarantine_to = $addr;
  $spam_quarantine_method = $quarantine_smtp;
  $policy_bank{'MAILHUB'}->{'spam_quarantine_to'} = $addr;
  $policy_bank{'MAILHUB'}->{'spam_quarantine_method'} = $quarantine_smtp;
  $policy_bank{'MAILHUB'}->{'spam_quarantine_to_maps'} = [ $addr ];
}

if ($ENV{'AMAVISD_VIRUS_QUARANTINE_TO'} && $ENV{'AMAVISD_VIRUS_QUARANTINE_TO'} =~ m/^([^\s,]+)$/) {
  my $addr = $1;
  $virus_quarantine_to = $addr;
  $virus_quarantine_method = $quarantine_smtp;
  $policy_bank{'MAILHUB'}->{'virus_quarantine_to'} = $addr;
  $policy_bank{'MAILHUB'}->{'virus_quarantine_method'} = $quarantine_smtp;
  $policy_bank{'MAILHUB'}->{'virus_quarantine_to_maps'} = [ $addr ];
}

# Allow connections from Docker network (Postfix container) and localhost.
# Optional AMAVISD_INET_ACL: space-separated IPs/CIDRs (e.g. "127.0.0.1 [::1] 172.16.0.0/12").
# If unset, default below covers localhost and Docker bridge range 172.16.0.0/12.
if ($ENV{'AMAVISD_INET_ACL'}) {
  @inet_acl = grep { /^[0-9a-fA-F.:\[\]\/]+$/ } split(/[\s,]+/, $ENV{'AMAVISD_INET_ACL'});
  @inet_acl = qw( 127.0.0.1 [::1] 172.16.0.0/12 ) unless @inet_acl;
} else {
  @inet_acl = qw( 127.0.0.1 [::1] 172.16.0.0/12 );
}

# Reduce log noise (1 = normal; higher = more debug)
$log_level = 1;
# Ensure MAILHUB policy also uses low log level (avoids "extra modules loaded" and other debug lines)
$policy_bank{'MAILHUB'}->{'log_level'} = 1;

# Amavisd requires FQDN for $myhostname (container hostname is not FQDN)
$myhostname = $ENV{'AMAVISD_MYHOSTNAME'} || 'mailhub-amavisd.local';
# Fix X-Virus-Scanned header (default in Conf.pm is '!change-mydomain-variable!.example.com')
$mydomain = $ENV{'MYDOMAIN'} || $myhostname;

# Treat these domains (and subdomains) as local so amavisd does not apply DiscardedOpenRelay/DiscardedOutbound.
# Otherwise e.g. braindead@muletrain.plud.org or braindead@localhost is "nonlocal" and spam is discarded instead of quarantined.
# AMAVISD_LOCAL_DOMAINS overrides: space- or comma-separated list (e.g. "plud.org" or ".plud.org").
# Each entry is used with a leading dot for subdomain matching if it does not already start with a dot.
# We always include localhost so that fetchmail "to user" (delivered as user@localhost) is considered local.
if ($ENV{'AMAVISD_LOCAL_DOMAINS'} && $ENV{'AMAVISD_LOCAL_DOMAINS'} =~ m/\S/) {
  @local_domains_acl = ($myhostname, 'localhost');
  foreach my $d (split(/[\s,]+/, $ENV{'AMAVISD_LOCAL_DOMAINS'})) {
    $d =~ s/^\s+|\s+$//g;
    next unless length($d);
    push @local_domains_acl, $d =~ m/^\./ ? $d : ".$d";
  }
} else {
  @local_domains_acl = ( ".$mydomain", $myhostname, 'localhost' );
}
1;

$path = '/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin';