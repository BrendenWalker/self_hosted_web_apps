# ClamAV daemon - listen on socket for amavisd (same container)
# Run as clamav so socket is created in /run/clamav; amavis is in group clamav
# Tuned for low CPU when idle (no scans): single thread, IdleTimeout, SelfCheck
# once per day; and low memory / minimal mail volume.
LocalSocket /run/clamav/clamd.ctl
DatabaseDirectory /var/lib/clamav
PidFile /run/clamav/clamd.pid
LogFile /var/log/clamav/clamd.log
LogTime yes
LogVerbose no

# Concurrency: single thread for minimal mail volume (greatly reduces idle CPU)
MaxThreads 1
MaxQueue 4
# Block during DB reload instead of loading second engine (saves RAM)
ConcurrentDatabaseReload no
ReadTimeout 120
# Close idle client connections so worker threads can sleep (reduces idle CPU)
IdleTimeout 60
# Database self-check once per day instead of default 10 min (reduces idle CPU)
SelfCheck 86400

# Scan limits: cap memory used per scan (mail attachments are usually small)
MaxFileSize 25M
MaxScanSize 50M
MaxRecursion 8
MaxFiles 2000
# Smaller cache = less RAM; still helps with repeated clean files
CacheSize 4096
