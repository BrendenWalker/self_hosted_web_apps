# ClamAV daemon - listen on socket for amavisd (same container)
# Override by placing clamd.conf in /home/mailhub-amavisd/
LocalSocket /run/clamav/clamd.ctl
User amavis
DatabaseDirectory /var/lib/clamav
PidFile /run/clamav/clamd.pid
LogFile /var/log/clamav/clamd.log
LogTime yes
LogVerbose no
MaxThreads 10
ReadTimeout 120
