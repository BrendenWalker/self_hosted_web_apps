# Amavisd config for Mailhub (Docker)
# Override by placing files in /home/mailhub-amavisd/
# Listens 10024 (from Postfix), reinjects to POSTFIX_HOST:10025.
# ClamAV: socket or TCP on 127.0.0.1. SpamAssassin: embedded (amavisd runs sa).

use strict;
$max_servers = 2;
$daemon_user  = 'amavis';
$daemon_group = 'amavis';

$inet_socket_bind = ['10024'];
$inet_socket_port = 10024;

# Re-inject to Postfix (host from env in 50-user.conf)
$forward_method = 'smtp:[mailhub-postfix]:10025';
$notify_method = $forward_method;

# ClamAV - unix socket (same container)
$clamd_socket = '/run/clamav/clamd.ctl';

# SpamAssassin - use embedded (default)
$sa_spam_subject_tag = '***SPAM*** ';
$sa_tag_level_deflt = -999;

# Optional: load custom config from data dir
$config_dir = '/home/mailhub-amavisd';
if (-d $config_dir && -f "$config_dir/amavisd.conf") {
  do "$config_dir/amavisd.conf";
}
# Re-inject host from env (set by stack: POSTFIX_HOST=mailhub-postfix)
do '/etc/amavis/conf.d/50-user.conf' if -r '/etc/amavis/conf.d/50-user.conf';

1;
